---
name: Security Scan — WebWatcher

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1'  # Every Monday at 03:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    name: 🔍 Gitleaks — Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  iac-scan:
    name: 🛡️ Trivy — IaC Config Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '0'
          ignore-unfixed: true

  yaml-lint:
    name: 📋 YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ibiqlik/action-yamllint@v3
        with:
          config_data: |
            extends: default
            ignore: |
              **/templates/
              templates/
            rules:
              line-length: disable
              indentation: disable
              colons: disable
              commas: disable
              braces: disable
              document-start: disable
              new-line-at-end-of-file: disable
              comments: disable
              comments-indentation: disable
              truthy: disable

  shell-check:
    name: 🐚 ShellCheck — Script Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run ShellCheck
        run: |
          find . -name "*.sh" ! -path "*/node_modules/*" ! -path "*/.git/*" ! -path "*/.terraform/*" | xargs -r shellcheck
